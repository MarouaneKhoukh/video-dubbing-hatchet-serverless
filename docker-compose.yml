version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet"]
      interval: 5s
      timeout: 5s
      retries: 5

  hatchet-engine:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:latest
    environment:
      DATABASE_URL: postgresql://hatchet:hatchet@postgres:5432/hatchet
      SERVER_TLS_STRATEGY: none
      SERVER_AUTH_COOKIE_SECRETS: "supersecretcookiesecret1 supersecretcookiesecret2"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_PORT: 7077
      SERVER_GRPC_BROADCAST_ADDRESS: "localhost:7077"
      SERVER_URL: "http://localhost:8080"
      SERVER_AUTH_EMAIL_VERIFY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7077:7077"

  hatchet-api:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-api:latest
    environment:
      DATABASE_URL: postgresql://hatchet:hatchet@postgres:5432/hatchet
      SERVER_TLS_STRATEGY: none
      SERVER_AUTH_COOKIE_SECRETS: "supersecretcookiesecret1 supersecretcookiesecret2"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_URL: "http://localhost:8080"
      SERVER_AUTH_EMAIL_VERIFY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  hatchet-frontend:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-frontend:latest
    environment:
      VITE_HATCHET_API_URL: "http://localhost:8080"
    ports:
      - "8090:80"

volumes:
  postgres_data:
